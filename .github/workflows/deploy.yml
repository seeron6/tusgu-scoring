# Deploys the static Next.js export to GitHub Pages whenever main is updated.
# Set the Supabase secrets in:
#   Repo → Settings → Secrets and variables → Actions → New repository secret
# Required:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
# Optional:
#   NEXT_PUBLIC_APP_PASSWORD     (defaults to "internalcomp26" if unset)
#   NEXT_PUBLIC_BASE_PATH        (defaults to "/<repo>")

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve base path
        id: base
        run: |
          if [ -n "${{ vars.NEXT_PUBLIC_BASE_PATH }}" ]; then
            echo "value=${{ vars.NEXT_PUBLIC_BASE_PATH }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (Next.js static export)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_PASSWORD: ${{ secrets.NEXT_PUBLIC_APP_PASSWORD }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.value }}
        run: npm run build

      # GitHub Pages serves _next/* by default. Add .nojekyll so the underscore
      # prefix isn't stripped, and copy index.html into 404.html so client-side
      # routing handles direct URLs that hit the 404 page.
      - name: Add .nojekyll + 404 fallback
        run: |
          touch out/.nojekyll
          if [ -f out/index.html ]; then cp out/index.html out/404.html; fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
